name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -f docker/backend.Dockerfile -t voicechat-backend .

      - name: Build Frontend Image
        run: docker build -f docker/frontend.Dockerfile -t voicechat-frontend .

      - name: Validate Compose Stack Start
        run: docker compose up -d
